<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RAG Visualizer</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}
h1 { margin-bottom: 10px; }
.container { max-width: 1100px; margin: auto; }
.card {
  background: #1e293b;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
button {
  background: #3b82f6;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  margin-top: 8px;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  margin-bottom: 6px;
  border-radius: 6px;
  border: none;
}
.progress {
  height: 8px;
  background: #334155;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 20px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: #3b82f6;
  transition: 0.4s;
}
.chunk, .vector {
  background: #334155;
  padding: 8px;
  border-radius: 6px;
  margin: 6px 0;
  font-size: 13px;
}
.small { font-size: 12px; opacity: 0.7; }
</style>
</head>
<body>
<div class="container">
<h1>Interactive RAG Visualizer</h1>
<div class="progress"><div class="progress-bar" id="progress"></div></div>

<div class="card">
<h3>1️⃣ Chunk Text</h3>
<textarea id="inputText" rows="4" placeholder="Enter text..."></textarea>
<label>Chunk Size</label>
<input type="number" id="chunkSize" value="40">
<label>Sliding Window</label>
<input type="number" id="slideSize" value="20">
<button onclick="chunkText()">Chunk</button>
<div id="chunks"></div>
</div>

<div class="card">
<h3>2️⃣ Create Vector Embeddings</h3>
<button onclick="createEmbeddings()" id="embedBtn" disabled>Create Embeddings</button>
<div id="vectors"></div>
</div>

<div class="card">
<h3>3️⃣ Save Vectors</h3>
<button onclick="saveVectors()" id="saveBtn" disabled>Save to LocalStorage</button>
<div class="small" id="saveStatus"></div>
</div>

<div class="card">
<h3>4️⃣ Ask Query</h3>
<textarea id="queryText" rows="2" placeholder="Enter your query..."></textarea>
<label>Top N Chunks</label>
<input type="number" id="topN" value="2">
<button onclick="askQuery()">Ask</button>
<div id="retrieved"></div>
</div>

<div class="card">
<h3>5️⃣ Prompt Preview</h3>
<div id="promptPreview" class="chunk"></div>
</div>

<div class="card">
<h3>6️⃣ LLM Answer (Simulated)</h3>
<div id="llmAnswer" class="chunk"></div>
</div>

</div>

<script>
let chunks = [];
let embeddings = [];

function updateProgress(percent){
  document.getElementById("progress").style.width = percent + "%";
}

function chunkText(){
  const text = document.getElementById("inputText").value;
  const size = parseInt(document.getElementById("chunkSize").value);
  const slide = parseInt(document.getElementById("slideSize").value);
  chunks = [];
  for(let i=0;i<text.length;i+=slide){
    chunks.push(text.slice(i,i+size));
  }
  const container = document.getElementById("chunks");
  container.innerHTML="";
  chunks.forEach((c,i)=>{
    container.innerHTML += `<div class="chunk"><b>Chunk ${i+1}</b>: ${c}</div>`;
  });
  document.getElementById("embedBtn").disabled=false;
  updateProgress(20);
}

function simpleEmbedding(text){
  const vector = new Array(10).fill(0);
  for(let i=0;i<text.length;i++){
    vector[i%10]+=text.charCodeAt(i);
  }
  return vector;
}

function createEmbeddings(){
  embeddings = chunks.map(c=>simpleEmbedding(c));
  const container = document.getElementById("vectors");
  container.innerHTML="";
  embeddings.forEach((v,i)=>{
    container.innerHTML += `<div class="vector"><b>Chunk ${i+1}</b>: [${v.join(", ")}]</div>`;
  });
  document.getElementById("saveBtn").disabled=false;
  updateProgress(40);
}

function saveVectors(){
  localStorage.setItem("rag_chunks", JSON.stringify(chunks));
  localStorage.setItem("rag_vectors", JSON.stringify(embeddings));
  document.getElementById("saveStatus").innerText="Saved successfully!";
  updateProgress(60);
}

function cosineSim(a,b){
  let dot=0, normA=0, normB=0;
  for(let i=0;i<a.length;i++){
    dot+=a[i]*b[i];
    normA+=a[i]*a[i];
    normB+=b[i]*b[i];
  }
  return dot/(Math.sqrt(normA)*Math.sqrt(normB));
}

function askQuery(){
  const query = document.getElementById("queryText").value;
  const topN = parseInt(document.getElementById("topN").value);

  const storedChunks = JSON.parse(localStorage.getItem("rag_chunks")||"[]");
  const storedVectors = JSON.parse(localStorage.getItem("rag_vectors")||"[]");

  const queryVec = simpleEmbedding(query);

  let scores = storedVectors.map((vec,i)=>({
    index:i,
    score:cosineSim(queryVec,vec)
  }));

  scores.sort((a,b)=>b.score-a.score);

  const topChunks = scores.slice(0,topN).map(s=>storedChunks[s.index]);

  const retrievedDiv = document.getElementById("retrieved");
  retrievedDiv.innerHTML="";
  topChunks.forEach((c,i)=>{
    retrievedDiv.innerHTML+=`<div class="chunk"><b>Match ${i+1}</b>: ${c}</div>`;
  });

  const prompt = `Answer the user's query based on given content.\n\nQuery: "${query}"\n\nContext:\n${topChunks.join("\n")}`;
  document.getElementById("promptPreview").innerText = prompt;

  // Simulated LLM response
  document.getElementById("llmAnswer").innerText =
    "Simulated LLM Answer:\n\nBased on the retrieved context, the answer relates to the most relevant chunks shown above.";

  updateProgress(100);
}
</script>
</body>
</html>
